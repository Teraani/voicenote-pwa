<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c5cfc"/>
      <stop offset="100%" style="stop-color:#fc5c7d"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Mic body -->
  <rect x="196" y="100" width="120" height="200" rx="60" fill="url(#grad)"/>
  <!-- Mic stand arc -->
  <path d="M140 280 Q140 380 256 380 Q372 380 372 280" stroke="url(#grad)" stroke-width="22" fill="none" stroke-linecap="round"/>
  <!-- Stand line -->
  <line x1="256" y1="380" x2="256" y2="420" stroke="url(#grad)" stroke-width="22" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="200" y1="420" x2="312" y2="420" stroke="url(#grad)" stroke-width="22" stroke-linecap="round"/>
  <!-- AI dot -->
  <circle cx="370" cy="150" r="36" fill="#5cface"/>
  <text x="370" y="160" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="28" fill="#0a0a0f">AI</text>
</svg>
